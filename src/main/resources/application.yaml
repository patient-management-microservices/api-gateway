server:
  port: ${SERVER_PORT:4005}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: patient-service-route
              uri: ${PATIENT_SERVICE_URL:http://patient-service:4000}
              predicates:
                - Path=/api/patients/**
              filters:
                - StripPrefix=1

            - id: api-docs-route
              uri: ${PATIENT_SERVICE_URL:http://patient-service:4000}
              predicates:
                - Path=/api-docs/patients
              filters:
                - RewritePath=/api-docs/patients, /v3/api-docs